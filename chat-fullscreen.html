<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask me anything — FIFA World Cup 2026 Hospitality</title>
  <style>
    :root { --amaBlue: #3b39c4; --amaBg: #f4f5f8; --amaTop: 72px; --amaBottom: 150px; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      overflow: hidden; background: var(--amaBg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .ama-top {
      position: fixed; top: 0; left: 0; right: 0; height: var(--amaTop);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; box-sizing: border-box; z-index: 2147483000; background: var(--amaBg);
    }
    .ama-title { color: var(--amaBlue); font-weight: 800; font-style: italic; font-size: 2rem; margin: 0; }
    .ama-close {
      width: 40px; height: 40px; border-radius: 50%; border: 1px solid #c9c9d4;
      background: #fff; cursor: pointer; font-size: 1.2rem; line-height: 1; color: #333;
      display: flex; align-items: center; justify-content: center;
    }
    .ama-close:hover { background: #f0f0f5; }

    .ama-bottom {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 2147483000;
      padding: 12px 24px 18px; box-sizing: border-box; background: var(--amaBg);
    }
    .ama-pill {
      max-width: 1200px; margin: 0 auto; background: var(--amaBlue);
      border-radius: 36px; padding: 8px; display: flex; align-items: center; gap: 8px;
    }
    .ama-pill input {
      flex: 1; border: 0; outline: 0; border-radius: 28px;
      padding: 16px 20px; font-size: 1rem; background: #fff; color: #222;
    }
    .ama-send {
      width: 48px; height: 48px; border-radius: 50%; border: 0; cursor: pointer;
      background: rgba(255,255,255,.25); color: #fff; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .ama-send:hover { background: rgba(255,255,255,.4); }
    .ama-quit {
      height: 48px; border-radius: 24px; border: 0; cursor: pointer; white-space: nowrap;
      background: #d0342c; color: #fff; font-size: .95rem; font-weight: 600; padding: 0 18px;
    }
    .ama-quit:hover { background: #b02a24; }
    .ama-chips { max-width: 1200px; margin: 12px auto 0; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .ama-chip {
      border: 1px solid var(--amaBlue); color: var(--amaBlue); background: #fff;
      border-radius: 22px; padding: 10px 18px; font-size: .95rem; cursor: pointer;
    }
    .ama-chip:hover { background: #eef0ff; }
  </style>
</head>
<body>
  <div class="ama-top">
    <h1 class="ama-title">Ask me anything</h1>
    <button class="ama-close" id="amaClose" aria-label="Close chat" title="Close chat">&#10005;</button>
  </div>

  <div class="ama-bottom">
    <div class="ama-pill">
      <input id="amaInput" type="text" placeholder="Ask me anything or log in for personalized help" autocomplete="off" aria-label="Message" />
      <button class="ama-send" id="amaSend" aria-label="Send message" title="Send">&#10148;</button>
      <button class="ama-quit" id="amaQuit" aria-label="Quit and end session" title="Quit &amp; end session">Quit</button>
    </div>
    <div class="ama-chips">
      <button class="ama-chip">Match schedule</button>
      <button class="ama-chip">Hospitality packages</button>
      <button class="ama-chip">Venues &amp; stadiums</button>
      <button class="ama-chip">What if my match is canceled?</button>
    </div>
  </div>

  <script type='text/javascript'>
    (function () {
      // onLocation MIAW deployments (Agentforce Iris) per environment.
      const ORGS = {
        staging: {
          orgId: '00DV9000004uKg5',
          deploymentName: 'Agentforce_Iris',
          siteUrl: 'https://onlocationexp--staging.sandbox.my.site.com/ESWAgentforceIris1778055798781',
          scrt2URL: 'https://onlocationexp--staging.sandbox.my.salesforce-scrt.com'
        },
        agentuat: {
          orgId: '00DV9000006H5fl',
          deploymentName: 'Agentforce_Iris',
          siteUrl: 'https://onlocationexp--agentuat.sandbox.my.site.com/ESWAgentforceIris1778055798781',
          scrt2URL: 'https://onlocationexp--agentuat.sandbox.my.salesforce-scrt.com'
        }
      };
      const params = new URLSearchParams(window.location.search);
      const orgParam = params.get('org');
      const cfg = ORGS[orgParam] || ORGS.staging;
      const lang = params.get('lang') || 'en_US';
      const DEBUG = params.get('debug') === '1';

      const input = document.getElementById('amaInput');
      const sendBtn = document.getElementById('amaSend');
      const closeBtn = document.getElementById('amaClose');

      /* ---------- Shadow-DOM helpers (ECv2 renders inside nested shadow roots) ---------- */
      function walkShadowRoots(root, cb) {
        if (!root) return;
        try { cb(root); } catch (e) {}
        let nodes;
        try { nodes = root.querySelectorAll('*'); } catch (e) { return; }
        for (const n of nodes) { if (n.shadowRoot) walkShadowRoots(n.shadowRoot, cb); }
      }

      // CSS injected into EVERY shadow root + the host doc: hide the widget's own
      // header + input footer, and make the conversation fill its container.
      const INJECT_ID = 'ama-shadow-style';
      // Conservative first pass: reliably hide the native text input (the only
      // <textarea> in the widget). The header hide is refined once we have the
      // exact class names from ?debug=1.
      const INJECT_CSS = `
        textarea { display:none !important; }
      `;
      function injectInto(root) {
        try {
          if (!root || root.getElementById && root.getElementById(INJECT_ID)) return;
          if (root.querySelector && root.querySelector('#' + INJECT_ID)) return;
          const style = document.createElement('style');
          style.id = INJECT_ID;
          style.textContent = INJECT_CSS;
          (root.appendChild ? root : document.head).appendChild(style);
        } catch (e) {}
      }

      // The MIAW conversation renders in the cross-origin iframe #embeddedMessagingFrame.
      // We can't reach inside it, but we CAN resize the iframe element to fill the band
      // between the custom title and the custom input bar. NOTE: an iframe needs an
      // EXPLICIT height (height:auto collapses it).
      function sizeContainer() {
        const el = document.getElementById('embeddedMessagingFrame');
        if (!el) return;
        const TOP = 84, BAND_BOTTOM = 162; // px reserved for title / custom input bar
        const st = el.style;
        st.setProperty('position', 'fixed', 'important');
        st.setProperty('top', TOP + 'px', 'important');
        st.setProperty('bottom', 'auto', 'important');
        st.setProperty('right', 'auto', 'important');
        st.setProperty('left', '50%', 'important');
        st.setProperty('transform', 'translateX(-50%)', 'important');
        st.setProperty('width', 'min(1200px, 92vw)', 'important');
        st.setProperty('max-width', '92vw', 'important');
        // Fill the band. NOTE: we do NOT clip the bottom — clipping also hides the
        // prechat "Start Conversation" button (cross-origin iframe: can't selectively hide).
        st.setProperty('height', 'calc(100vh - ' + TOP + 'px - ' + BAND_BOTTOM + 'px)', 'important');
        st.setProperty('max-height', 'none', 'important');
        st.setProperty('min-height', '0', 'important');
        st.setProperty('border', '0', 'important');
        st.setProperty('border-radius', '14px', 'important');
        st.setProperty('box-shadow', '0 1px 4px rgba(0,0,0,.08)', 'important');
        st.setProperty('clip-path', 'none', 'important');
      }

      function applyAll() {
        // Cross-origin iframe: we can only resize the iframe element itself.
        sizeContainer();
        if (DEBUG) dumpShadow();
      }

      // Debug: dump the widget's shadow-DOM structure so we can lock exact selectors.
      function dumpShadow() {
        const lines = [];
        walkShadowRoots(document.body, (root) => {
          const host = root.host;
          if (!host) return;
          const hc = host.getAttribute && host.getAttribute('class');
          lines.push('HOST: ' + host.tagName.toLowerCase() + (hc ? '.' + hc.trim().split(/\s+/).join('.') : ''));
          try {
            root.querySelectorAll('*').forEach((e) => {
              const c = e.getAttribute && e.getAttribute('class');
              const did = e.getAttribute && e.getAttribute('data-id');
              if (c || did || /textarea|button/i.test(e.tagName)) {
                lines.push('  ' + e.tagName.toLowerCase() + (c ? '.' + c.trim().split(/\s+/).join('.') : '') + (did ? '[data-id=' + did + ']' : ''));
              }
            });
          } catch (e) {}
        });
        const text = lines.join('\n');
        console.log('%c[AMA shadow dump]\n' + text, 'color:#3b39c4');
        window.__amaShadowDump = text; // read via console: window.__amaShadowDump
      }

      /* ---------- Custom input -> send into the conversation ---------- */
      function sendMessage(text) {
        const msg = (text != null ? text : input.value || '').trim();
        if (!msg) return;
        try {
          const api = window.embeddedservice_bootstrap && embeddedservice_bootstrap.utilAPI;
          if (api && typeof api.sendTextMessage === 'function') {
            api.sendTextMessage(msg).catch((e) => console.error('sendTextMessage failed:', e));
          } else {
            console.warn('embeddedservice_bootstrap.utilAPI.sendTextMessage not available in this release.');
          }
        } catch (e) { console.error('Error sending message:', e); }
        input.value = ''; input.focus();
      }

      function closeSession() {
        const done = () => { window.location.href = 'index.html'; };
        try {
          const b = window.embeddedservice_bootstrap;
          if (b && b.userVerificationAPI && typeof b.userVerificationAPI.clearSession === 'function') {
            b.userVerificationAPI.clearSession(true)
              .then(() => b.utilAPI && b.utilAPI.removeAllComponents && b.utilAPI.removeAllComponents())
              .catch(() => {}).finally(done);
          } else if (b && b.utilAPI && b.utilAPI.removeAllComponents) {
            try { b.utilAPI.removeAllComponents(); } catch (e) {} done();
          } else { done(); }
        } catch (e) { done(); }
      }

      sendBtn.addEventListener('click', () => sendMessage());
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
      closeBtn.addEventListener('click', closeSession);
      const quitBtn = document.getElementById('amaQuit');
      if (quitBtn) quitBtn.addEventListener('click', closeSession);
      document.querySelectorAll('.ama-chip').forEach((chip) => chip.addEventListener('click', () => sendMessage(chip.textContent)));

      /* ---------- Boot MIAW ---------- */
      window.initEmbeddedMessaging = function () {
        try {
          embeddedservice_bootstrap.settings.language = lang;
          embeddedservice_bootstrap.init(cfg.orgId, cfg.deploymentName, cfg.siteUrl, { scrt2URL: cfg.scrt2URL });

          // launchChat must be called AFTER the button-created event (not onReady).
          window.addEventListener('onEmbeddedMessagingButtonCreated', () => {
            if (embeddedservice_bootstrap.utilAPI && embeddedservice_bootstrap.utilAPI.launchChat) {
              embeddedservice_bootstrap.utilAPI.launchChat().catch((e) => console.error('launchChat failed:', e));
            }
          });
          window.addEventListener('onEmbeddedMessagingReady', () => {
            try {
              embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({ EndUserLanguage: embeddedservice_bootstrap.settings.language });
            } catch (e) {}
            // Re-apply styling as the widget renders / re-renders.
            for (const t of [300, 800, 1500, 3000, 5000, 8000]) setTimeout(applyAll, t);
            const mo = new MutationObserver(() => applyAll());
            mo.observe(document.body, { childList: true, subtree: true });
          });
        } catch (err) { console.error('Error loading Embedded Messaging: ', err); }
      };

      const s = document.createElement('script');
      s.type = 'text/javascript';
      s.src = cfg.siteUrl + '/assets/js/bootstrap.min.js';
      s.onload = window.initEmbeddedMessaging;
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
