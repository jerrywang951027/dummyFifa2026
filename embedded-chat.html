<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embedded Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script type='text/javascript'>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const org = params.get('org') === 'agentuat' ? 'agentuat' : 'staging';
      const lang = params.get('lang') || 'en_US';

      const ORGS = {
        staging: {
          orgId: '00DV9000004uKg5',
          siteUrl: 'https://onlocationexp--staging.sandbox.my.site.com/ESWAgentforceIris1778055798781',
          scrt2URL: 'https://onlocationexp--staging.sandbox.my.salesforce-scrt.com'
        },
        agentuat: {
          orgId: '00DV9000006H5fl',
          siteUrl: 'https://onlocationexp--agentuat.sandbox.my.site.com/ESWAgentforceIris1778055798781',
          scrt2URL: 'https://onlocationexp--agentuat.sandbox.my.salesforce-scrt.com'
        }
      };

      const cfg = ORGS[org];

      window.initEmbeddedMessaging = function () {
        try {
          embeddedservice_bootstrap.settings.language = lang;

          embeddedservice_bootstrap.init(
            cfg.orgId,
            'Agentforce_Iris',
            cfg.siteUrl,
            { scrt2URL: cfg.scrt2URL }
          );

          window.addEventListener('onEmbeddedMessagingReady', () => {
            embeddedservice_bootstrap.prechatAPI.setHiddenPrechatFields({
              EndUserLanguage: embeddedservice_bootstrap.settings.language
            });
          });
        } catch (err) {
          console.error('Error loading Embedded Messaging: ', err);
        }
      };

      const s = document.createElement('script');
      s.type = 'text/javascript';
      s.src = cfg.siteUrl + '/assets/js/bootstrap.min.js';
      s.onload = window.initEmbeddedMessaging;
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
